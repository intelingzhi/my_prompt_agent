name: Build and Deploy

on:
  push:
    branches:
      - main  # 只有推送到 main 分支才触发

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/prompt-optimizer-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/prompt-optimizer-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录 ghcr.io
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. 构建并推送 backend 镜像
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest

      # 4. 构建并推送 frontend 镜像
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest

      # 5. SSH 登录服务器，拉取新镜像并重启容器
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 登录 ghcr.io
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 后端
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker stop prompt-backend || true
            docker rm prompt-backend || true
            docker run -d \
              --name prompt-backend \
              --restart always \
              -p 8000:8000 \
              -v /home/bdi/config.yaml:/app/config.yaml \
              ${{ env.IMAGE_BACKEND }}:latest

            # 前端
            docker pull ${{ env.IMAGE_FRONTEND }}:latest
            docker stop prompt-frontend || true
            docker rm prompt-frontend || true
            docker run -d \
              --name prompt-frontend \
              --restart always \
              -p 3000:3000 \
              -e NEXT_PUBLIC_API_URL=http://192.168.0.126:8000 \
              ${{ env.IMAGE_FRONTEND }}:latest
